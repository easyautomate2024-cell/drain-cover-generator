<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>排水溝蓋 STL ジェネレーター</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ========== サイドパネル ========== */
    #panel {
      width: 260px;
      min-width: 260px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
      overflow-y: auto;
    }

    #panel h1 {
      font-size: 15px;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 1px;
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 1px solid #0f3460;
    }
    #panel h1 .close-btn {
      display: none;  /* デスクトップでは非表示。@media クエリで表示 */
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #7f8c8d;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .param-group { display: flex; flex-direction: column; gap: 10px; }

    .param-row { display: flex; flex-direction: column; gap: 4px; }

    .param-row label {
      font-size: 12px;
      color: #bdc3c7;
      display: flex;
      justify-content: space-between;
    }

    .param-row label span { color: #e94560; font-weight: 600; }

    .param-row input[type="range"] {
      width: 100%;
      accent-color: #e94560;
      cursor: pointer;
    }

    /* ========== バウンディングボックス ========== */
    #bbox {
      background: #0f3460;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.8;
    }
    #bbox .bbox-title {
      font-size: 11px; font-weight: 600; color: #7f8c8d;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
    }
    #bbox .bbox-row { display: flex; justify-content: space-between; }
    #bbox .bbox-val { color: #2ecc71; font-weight: 600; }

    /* ========== ボタン ========== */
    button {
      width: 100%; padding: 10px; border: none;
      border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    #btn-update   { background: #0f3460; color: #eee; }
    #btn-download { background: #e94560; color: #fff; }

    /* ========== 操作ガイド ========== */
    #guide {
      font-size: 11px; color: #7f8c8d; line-height: 1.7;
      border-top: 1px solid #0f3460; padding-top: 10px;
    }

    /* ========== 3Dビューワー ========== */
    #viewer { flex: 1; position: relative; }
    #viewer canvas { display: block; }

    #axis-label {
      position: absolute; bottom: 16px; left: 16px;
      font-size: 11px; color: #7f8c8d; pointer-events: none; line-height: 1.6;
    }
    #status {
      position: absolute; top: 16px; left: 16px;
      font-size: 12px; color: #2ecc71; pointer-events: none;
    }

    /* ========== モバイル用トグルボタン（パネル開閉）========== */
    #panel-toggle {
      display: none;  /* デスクトップでは非表示 */
      position: absolute;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #e94560;
      font-size: 22px;
      cursor: pointer;
      z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* ========== レスポンシブ（スマホ・タブレット）========== */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        height: 100dvh;  /* iOS Safari の URL バー対応 */
      }

      /* パネルはオーバーレイにしてスライドイン */
      #panel {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        min-width: 0;
        max-height: none;
        z-index: 100;
        border-right: none;
        padding: 16px 14px 24px;
        transform: translateY(100%);
        transition: transform 0.3s ease-out;
        gap: 14px;
      }
      #panel.open {
        transform: translateY(0);
      }

      /* パネル内ヘッダ：閉じるボタン用に flex */
      #panel h1 {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 10px;
        font-size: 14px;
      }
      #panel h1 .close-btn {
        display: flex;  /* スマホでは表示 */
        align-items: center;
        justify-content: center;
        background: #0f3460;
        border: none;
        color: #eee;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        font-size: 18px;
        cursor: pointer;
        padding: 0;
      }

      /* ビューワーは全画面に */
      #viewer {
        flex: 1;
        height: 100dvh;
      }

      /* トグルボタンを表示 */
      #panel-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* タッチ操作で滑らかにするため要素を大きく */
      .param-row label { font-size: 13px; }
      .param-row input[type="range"] {
        height: 28px;
        padding: 8px 0;
      }
      .param-row input[type="range"]::-webkit-slider-thumb {
        width: 22px; height: 22px;
      }

      button {
        padding: 14px;
        font-size: 14px;
        min-height: 48px;
      }

      #bbox { font-size: 13px; }
      #bbox .bbox-val { font-size: 14px; }

      #guide { display: none; }  /* スマホでは操作ガイドを省略 */

      #axis-label { display: none; }
      #status {
        font-size: 11px;
        top: 12px;
        left: 12px;
      }
    }

    /* ========== 横向きスマホ専用調整 ========== */
    @media (max-width: 900px) and (orientation: landscape) {
      #panel { padding: 12px 14px; gap: 10px; }
      #panel h1 { font-size: 13px; padding-bottom: 8px; }
    }
  </style>
</head>
<body>

<!-- ========== サイドパネル ========== -->
<div id="panel">
  <h1>
    🛁 排水溝蓋 Generator
    <button class="close-btn" id="panel-close" aria-label="閉じる">✕</button>
  </h1>

  <div>
    <div class="section-title">蓋の基本寸法</div>
    <div class="param-group">
      <div class="param-row">
        <label>外径 (mm) <span id="val-outerD">150</span></label>
        <input type="range" id="outerD" min="50" max="250" value="150" step="1">
      </div>
      <div class="param-row">
        <label>厚み (mm) <span id="val-thickness">5</span></label>
        <input type="range" id="thickness" min="2" max="20" value="5" step="0.5">
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">凹み寸法</div>
    <div class="param-group">
      <div class="param-row">
        <label>凹み直径 (mm) <span id="val-holeD">125</span></label>
        <input type="range" id="holeD" min="10" max="230" value="125" step="1">
      </div>
      <div class="param-row">
        <label>凹み深さ (mm) <span id="val-holeDepth">40</span></label>
        <input type="range" id="holeDepth" min="0.5" max="100" value="40" step="0.5">
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">排水メッシュ</div>
    <div class="param-group">
      <div class="param-row">
        <label>桟の幅 (mm) <span id="val-barW">1.5</span></label>
        <input type="range" id="barW" min="0.5" max="10" value="1.5" step="0.1">
      </div>
      <div class="param-row">
        <label>穴のサイズ (mm) <span id="val-slotSize">8</span></label>
        <input type="range" id="slotSize" min="1" max="40" value="8" step="0.5">
      </div>
      <div class="param-row" style="flex-direction: row; align-items: center; gap: 8px;">
        <input type="checkbox" id="meshOn" checked style="accent-color: #e94560;">
        <label for="meshOn" style="cursor: pointer;">メッシュを有効化</label>
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">中央凸（オプション）</div>
    <div class="param-group">
      <div class="param-row" style="flex-direction: row; align-items: center; gap: 8px;">
        <input type="checkbox" id="bumpOn" style="accent-color: #e94560;">
        <label for="bumpOn" style="cursor: pointer;">中央凸を有効化</label>
      </div>
      <div class="param-row">
        <label>中央凸 直径 (mm) <span id="val-bumpD">25</span></label>
        <input type="range" id="bumpD" min="5" max="100" value="25" step="1">
      </div>
      <div class="param-row">
        <label>中央凸 高さ (mm) <span id="val-bumpH">8</span></label>
        <input type="range" id="bumpH" min="1" max="50" value="8" step="0.5">
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">外周フック（ネット引っかけ）</div>
    <div class="param-group">
      <div class="param-row" style="flex-direction: row; align-items: center; gap: 8px;">
        <input type="checkbox" id="hooksOn" style="accent-color: #e94560;">
        <label for="hooksOn" style="cursor: pointer;">フックを有効化</label>
      </div>
      <div class="param-row">
        <label>フック数 <span id="val-hookCount">8</span></label>
        <input type="range" id="hookCount" min="3" max="36" value="8" step="1">
      </div>
      <div class="param-row">
        <label>フック高さ (mm) <span id="val-hookH">3</span></label>
        <input type="range" id="hookH" min="1" max="15" value="3" step="0.5">
      </div>
      <div class="param-row">
        <label>フック基底直径 (mm) <span id="val-hookD">3</span></label>
        <input type="range" id="hookD" min="1" max="10" value="3" step="0.5">
      </div>
    </div>
  </div>

  <div id="bbox">
    <div class="bbox-title">📦 バウンディングボックス</div>
    <div class="bbox-row"><span>幅 (X)</span><span class="bbox-val" id="bb-x">100.0 mm</span></div>
    <div class="bbox-row"><span>奥行 (Y)</span><span class="bbox-val" id="bb-y">100.0 mm</span></div>
    <div class="bbox-row"><span>高さ (Z)</span><span class="bbox-val" id="bb-z">5.0 mm</span></div>
  </div>

  <button id="btn-update">🔄 形状を更新</button>
  <button id="btn-download">⬇ STL ダウンロード</button>

  <div id="guide">
    <b>マウス操作</b><br>
    🖱 左ドラッグ：回転<br>
    🖱 右ドラッグ：移動<br>
    🖱 ホイール：ズーム
  </div>
</div>

<!-- ========== 3Dビューワー ========== -->
<div id="viewer">
  <div id="status">✅ 準備完了</div>
  <div id="axis-label">赤: X軸　緑: Y軸　青: Z軸</div>
  <button id="panel-toggle" aria-label="設定パネルを開く">⚙</button>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
'use strict';

// ============================================================
//  シンプルな OrbitControls
// ============================================================
function SimpleOrbitControls(camera, domElement) {
  this.camera     = camera;
  this.domElement = domElement;
  this.target     = new THREE.Vector3(0, 0, 0);

  let isDragging  = false;
  let isPanning   = false;
  let lastX = 0, lastY = 0;
  const scope = this;

  // ----- 共通の回転処理 -----
  function rotate(dx, dy) {
    const offset = new THREE.Vector3().subVectors(camera.position, scope.target);
    const radius = offset.length();
    let theta = Math.atan2(offset.x, offset.z);
    let phi   = Math.acos(Math.max(-1, Math.min(1, offset.y / radius)));
    theta -= dx * 0.005;
    phi   -= dy * 0.005;
    phi    = Math.max(0.05, Math.min(Math.PI - 0.05, phi));
    camera.position.set(
      scope.target.x + radius * Math.sin(phi) * Math.sin(theta),
      scope.target.y + radius * Math.cos(phi),
      scope.target.z + radius * Math.sin(phi) * Math.cos(theta)
    );
    camera.lookAt(scope.target);
  }

  // ----- 共通のパン処理 -----
  function pan(dx, dy) {
    const right = new THREE.Vector3();
    const up    = new THREE.Vector3();
    right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), camera.up).normalize();
    up.copy(camera.up);
    const panSpeed = camera.position.distanceTo(scope.target) * 0.001;
    scope.target.addScaledVector(right, -dx * panSpeed);
    scope.target.addScaledVector(up,     dy * panSpeed);
    camera.position.addScaledVector(right, -dx * panSpeed);
    camera.position.addScaledVector(up,     dy * panSpeed);
    camera.lookAt(scope.target);
  }

  // ----- 共通のズーム処理 -----
  function zoom(factor) {
    const offset = new THREE.Vector3().subVectors(camera.position, scope.target);
    offset.multiplyScalar(factor);
    camera.position.copy(scope.target).add(offset);
    camera.lookAt(scope.target);
  }

  // ===== マウス操作 =====
  domElement.addEventListener('mousedown', (e) => {
    lastX = e.clientX; lastY = e.clientY;
    if (e.button === 0) isDragging = true;
    if (e.button === 2) isPanning  = true;
    e.preventDefault();
  });

  document.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });

  document.addEventListener('mousemove', (e) => {
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    if (isDragging) rotate(dx, dy);
    if (isPanning)  pan(dx, dy);
  });

  domElement.addEventListener('wheel', (e) => {
    zoom(e.deltaY > 0 ? 1.1 : 0.9);
  }, { passive: true });

  domElement.addEventListener('contextmenu', (e) => e.preventDefault());

  // ===== タッチ操作（スマホ・タブレット）=====
  let touchMode  = null;   // 'rotate' | 'pinch'
  let touchLastX = 0, touchLastY = 0;
  let pinchDist  = 0;
  let pinchMidX  = 0, pinchMidY = 0;

  domElement.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchMode = 'rotate';
      touchLastX = e.touches[0].clientX;
      touchLastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      touchMode = 'pinch';
      const t0 = e.touches[0], t1 = e.touches[1];
      const dx = t0.clientX - t1.clientX;
      const dy = t0.clientY - t1.clientY;
      pinchDist = Math.hypot(dx, dy);
      pinchMidX = (t0.clientX + t1.clientX) / 2;
      pinchMidY = (t0.clientY + t1.clientY) / 2;
    }
    e.preventDefault();
  }, { passive: false });

  domElement.addEventListener('touchmove', (e) => {
    if (touchMode === 'rotate' && e.touches.length === 1) {
      const t = e.touches[0];
      const dx = t.clientX - touchLastX;
      const dy = t.clientY - touchLastY;
      touchLastX = t.clientX; touchLastY = t.clientY;
      rotate(dx, dy);
    } else if (touchMode === 'pinch' && e.touches.length === 2) {
      const t0 = e.touches[0], t1 = e.touches[1];
      const dx = t0.clientX - t1.clientX;
      const dy = t0.clientY - t1.clientY;
      const newDist = Math.hypot(dx, dy);
      // ピンチでズーム
      if (pinchDist > 0) {
        const factor = pinchDist / newDist;
        zoom(factor);
      }
      pinchDist = newDist;
      // 中心移動でパン
      const newMidX = (t0.clientX + t1.clientX) / 2;
      const newMidY = (t0.clientY + t1.clientY) / 2;
      pan(newMidX - pinchMidX, newMidY - pinchMidY);
      pinchMidX = newMidX; pinchMidY = newMidY;
    }
    e.preventDefault();
  }, { passive: false });

  domElement.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
      touchMode = null;
    } else if (e.touches.length === 1) {
      // ピンチから1本指へ復帰
      touchMode = 'rotate';
      touchLastX = e.touches[0].clientX;
      touchLastY = e.touches[0].clientY;
    }
  });
}

// ============================================================
//  シーンセットアップ
// ============================================================
const viewer   = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
viewer.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// カメラ（位置を先に設定）
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 5000);
camera.position.set(120, 100, 170);
camera.lookAt(0, 5, 0);

// OrbitControls
const orbitControls = new SimpleOrbitControls(camera, renderer.domElement);
orbitControls.target.set(0, 5, 0);

// ライティング
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(150, 200, 100);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8899ff, 0.3);
fillLight.position.set(-100, -80, -100);
scene.add(fillLight);

// グリッド & 軸
scene.add(new THREE.GridHelper(400, 40, 0x0f3460, 0x0f3460));
const axesHelper = new THREE.AxesHelper(60);
scene.add(axesHelper);

// 中心軸（Y方向の長い軸 - 深い凹みでも参照しやすく）
const centerAxisGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0, -100, 0),
  new THREE.Vector3(0,  100, 0)
]);
scene.add(new THREE.Line(centerAxisGeo, new THREE.LineBasicMaterial({ color: 0x2ecc71, opacity: 0.3, transparent: true })));

// ============================================================
//  形状グループ & マテリアル
// ============================================================
var meshGroup = new THREE.Group();
scene.add(meshGroup);

var bboxHelper = null;

const matOuter = new THREE.MeshPhongMaterial({
  color: 0x7788aa, specular: 0xffffff, shininess: 80, side: THREE.DoubleSide
});
const matInner = new THREE.MeshPhongMaterial({
  color: 0x4488bb, specular: 0xffffff, shininess: 60, side: THREE.DoubleSide
});

// ============================================================
//  メッシュ穴あき円盤の構築（凹底面・凸天面 共通）
// ============================================================
function buildMeshDisk(radius, thick, topY, barW, slotSize, material) {
  const shape = new THREE.Shape();
  shape.absarc(0, 0, radius, 0, Math.PI * 2, false);

  const pitch       = barW + slotSize;
  const halfSlot    = slotSize / 2;
  const innerSafeR  = radius - barW;
  const outerLimit  = radius;
  const slotInfo    = [];

  if (outerLimit > 0) {
    const gridN = Math.ceil(radius * 2 / pitch) + 2;
    const start = -Math.floor(gridN / 2) * pitch;

    for (let i = 0; i < gridN; i++) {
      for (let j = 0; j < gridN; j++) {
        const cx = start + i * pitch;
        const cy = start + j * pitch;

        const farX = Math.abs(cx) + halfSlot;
        const farY = Math.abs(cy) + halfSlot;
        const farDist = Math.sqrt(farX * farX + farY * farY);
        const nearX = Math.max(0, Math.abs(cx) - halfSlot);
        const nearY = Math.max(0, Math.abs(cy) - halfSlot);
        const nearDist = Math.sqrt(nearX * nearX + nearY * nearY);

        if (nearDist >= outerLimit) continue;
        const centerDist = Math.sqrt(cx * cx + cy * cy);
        if (centerDist > outerLimit - barW * 0.3) continue;

        const slot = new THREE.Path();
        if (farDist <= innerSafeR) {
          // 完全内側
          slot.moveTo(cx - halfSlot, cy - halfSlot);
          slot.lineTo(cx - halfSlot, cy + halfSlot);
          slot.lineTo(cx + halfSlot, cy + halfSlot);
          slot.lineTo(cx + halfSlot, cy - halfSlot);
          slot.lineTo(cx - halfSlot, cy - halfSlot);
        } else {
          // 円弧クリップ
          const samples = 16;
          const corners = [
            [cx - halfSlot, cy - halfSlot],
            [cx - halfSlot, cy + halfSlot],
            [cx + halfSlot, cy + halfSlot],
            [cx + halfSlot, cy - halfSlot],
          ];
          const rawPts = [];
          for (let s = 0; s < 4; s++) {
            const a = corners[s], b = corners[(s + 1) % 4];
            for (let k = 0; k < samples; k++) {
              const t = k / samples;
              let x = a[0] + (b[0] - a[0]) * t;
              let y = a[1] + (b[1] - a[1]) * t;
              const r = Math.sqrt(x * x + y * y);
              if (r > outerLimit) { const sc = outerLimit / r; x *= sc; y *= sc; }
              rawPts.push([x, y]);
            }
          }
          const pts = [];
          for (const p of rawPts) {
            const prev = pts[pts.length - 1];
            if (!prev || Math.abs(prev[0] - p[0]) > 0.05 || Math.abs(prev[1] - p[1]) > 0.05) pts.push(p);
          }
          if (pts.length > 1) {
            const f = pts[0], l = pts[pts.length - 1];
            if (Math.abs(f[0] - l[0]) < 0.05 && Math.abs(f[1] - l[1]) < 0.05) pts.pop();
          }
          if (pts.length < 3) continue;
          slot.moveTo(pts[0][0], pts[0][1]);
          for (let k = 1; k < pts.length; k++) slot.lineTo(pts[k][0], pts[k][1]);
          slot.lineTo(pts[0][0], pts[0][1]);
        }
        shape.holes.push(slot);
        slotInfo.push({ cx, cy, halfSlot });
      }
    }
  }

  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: thick, bevelEnabled: false, curveSegments: 64,
  });
  geo.rotateX(-Math.PI / 2);
  geo.translate(0, topY - thick, 0);
  const mesh = new THREE.Mesh(geo, material);
  mesh.userData.csgRebuild = {
    type: 'meshDisk',
    outerR: radius,
    centerHoleR: 0,
    thickness: thick,
    topY: topY,
    slots: slotInfo,
  };
  meshGroup.add(mesh);
}

// ============================================================
//  中央凸（オプション）の構築
// ============================================================
function buildCenterBump(bumpR, bumpH, baseY, barW, slotSize, meshOn) {
  const wallThick = barW;
  const innerR    = Math.max(0.5, bumpR - wallThick);

  if (bumpR < 1 || bumpH < 0.5) return;

  if (meshOn && innerR > 0.5 && (barW + slotSize) > 0.1) {
    // メッシュ天面（薄い円盤）
    const topCapThick = Math.max(0.8, barW * 0.6);
    const wallH = Math.max(0, bumpH - topCapThick);

    // 側壁ケージ
    if (wallH > 0.1) {
      buildCageWall(bumpR, innerR, baseY, baseY + wallH, barW, slotSize);
    }

    // 天面メッシュ
    buildMeshDisk(bumpR, topCapThick, baseY + bumpH, barW, slotSize, matInner);
  } else {
    // ソリッド円柱（メッシュOFF or 内径が確保できない場合）
    const geo = new THREE.CylinderGeometry(bumpR, bumpR, bumpH, 64);
    geo.translate(0, baseY + bumpH / 2, 0);
    meshGroup.add(new THREE.Mesh(geo, matOuter));
  }
}

// ============================================================
//  ケージ壁の構築（横リブ + 縦バー）
// ============================================================
function buildCageWall(outerR, innerR, yBottom, yTop, barW, slotSize) {
  const wallH = yTop - yBottom;
  if (innerR < 0.5 || wallH < 0.1) return;

  const avgR    = (outerR + innerR) / 2;
  const circ    = 2 * Math.PI * avgR;
  const numCols = Math.max(3, Math.round(circ / (barW + slotSize)));
  const colAng  = (2 * Math.PI) / numCols;
  const barAng  = Math.min(barW / avgR, colAng * 0.9);

  let numRows = Math.floor((wallH - barW) / (slotSize + barW));
  let slotH   = 0;
  if (numRows > 0) {
    slotH = (wallH - (numRows + 1) * barW) / numRows;
  }

  // numRows = 0 → 全高さソリッドリング
  if (numRows <= 0) {
    const shape = new THREE.Shape();
    shape.absarc(0, 0, outerR, 0, Math.PI * 2, false);
    const hole = new THREE.Path();
    hole.absarc(0, 0, innerR, 0, Math.PI * 2, true);
    shape.holes.push(hole);

    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: wallH, bevelEnabled: false, curveSegments: 64,
    });
    geo.rotateX(-Math.PI / 2);
    geo.translate(0, yBottom, 0);
    meshGroup.add(new THREE.Mesh(geo, matOuter));
    return;
  }

  // 水平リブ（× numRows + 1）
  for (let r = 0; r <= numRows; r++) {
    const ribBottomY = yBottom + r * (barW + slotH);
    const shape = new THREE.Shape();
    shape.absarc(0, 0, outerR, 0, Math.PI * 2, false);
    const hole = new THREE.Path();
    hole.absarc(0, 0, innerR, 0, Math.PI * 2, true);
    shape.holes.push(hole);

    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: barW, bevelEnabled: false, curveSegments: 64,
    });
    geo.rotateX(-Math.PI / 2);
    geo.translate(0, ribBottomY, 0);
    meshGroup.add(new THREE.Mesh(geo, matOuter));
  }

  // 垂直バー（× numRows × numCols）：両端をリブと正確に一致させる（welding で結合）
  if (slotH > 0) {
    for (let row = 0; row < numRows; row++) {
      const barBottomY = yBottom + (row + 1) * barW + row * slotH;
      const barH = slotH;
      for (let col = 0; col < numCols; col++) {
        const a0 = col * colAng;
        const a1 = a0 + barAng;

        const wedge = new THREE.Shape();
        wedge.moveTo(outerR * Math.cos(a0), outerR * Math.sin(a0));
        wedge.absarc(0, 0, outerR, a0, a1, false);
        wedge.lineTo(innerR * Math.cos(a1), innerR * Math.sin(a1));
        wedge.absarc(0, 0, innerR, a1, a0, true);
        wedge.closePath();

        const geo = new THREE.ExtrudeGeometry(wedge, {
          depth: barH, bevelEnabled: false, curveSegments: 8,
        });
        geo.rotateX(-Math.PI / 2);
        geo.translate(0, barBottomY, 0);
        meshGroup.add(new THREE.Mesh(geo, matOuter));
      }
    }
  }
}

// ============================================================
//  外周フック（尖った突起・放射方向）の構築
// ============================================================
function buildHooks(outerR, holeR, thickness, count, hookH, hookBaseR) {
  if (count < 1 || hookH < 0.1 || hookBaseR < 0.1) return;

  // 底面全体が rim 材料内に密着するよう配置:
  //   底面コーナー（半径方向の最遠点）がリム外周より少し内側に来るよう、
  //   底面中心を embed 量だけ内側に押し込む
  //   → placeR = sqrt(outerR² - hookBaseR²) - embed
  //   embed の分だけ円錐がリム内部に重なり、非多様体（同一面）を回避できる
  const embed = 0.3;
  const placeR = Math.max(
    holeR + 0.1,
    Math.sqrt(Math.max(0, outerR * outerR - hookBaseR * hookBaseR)) - embed
  );

  // 縦方向：底面がリムの Y 範囲内に収まるよう中央付近に配置
  //   hookBaseR が thickness/2 を超える場合は端まで寄せる
  let baseCenterY = thickness / 2;
  if (hookBaseR < thickness / 2) {
    baseCenterY = thickness / 2;  // リム中央
  } else {
    baseCenterY = hookBaseR;       // 下端を Y=0 に寄せる
  }

  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;

    const cone = new THREE.ConeGeometry(hookBaseR, hookH, 16);
    // ConeGeometry のデフォルト軸（+Y）を +X 軸（径方向）に倒す
    cone.rotateZ(-Math.PI / 2);
    // 軸が +X になった状態で、底面が X=placeR、Y=baseCenterY、Z=0 に来るよう移動
    cone.translate(placeR + hookH / 2, baseCenterY, 0);
    // Y 軸回りに回転して周方向の位置を決定
    cone.rotateY(angle);

    meshGroup.add(new THREE.Mesh(cone, matOuter));
  }
}

// ============================================================
//  側壁メッシュ（ケージ状）の構築
// ============================================================
function buildSideMesh(holeR, holeDepth, barW, slotSize, topY) {
  const wallThick   = barW;                              // 壁の厚み = 桟の幅
  const outerR      = holeR;                             // 壁の外側半径
  const innerR      = Math.max(0.5, holeR - wallThick);  // 壁の内側半径
  const wallBottomY = topY - holeDepth;                  // 壁の下端 Y
  const wallH       = holeDepth;

  if (innerR < 0.5) return;

  // 周方向の分割
  const avgR    = (outerR + innerR) / 2;
  const circ    = 2 * Math.PI * avgR;
  const numCols = Math.max(3, Math.round(circ / (barW + slotSize)));
  const colAng  = (2 * Math.PI) / numCols;
  const barAng  = Math.min(barW / avgR, colAng * 0.9);   // 桟が占める角度
  // slotAng = colAng - barAng

  // 縦方向の分割（リブ間に slot 行が入る）
  // 配置: barW + (slotH + barW) × numRows = wallH
  let numRows = Math.floor((wallH - barW) / (slotSize + barW));
  let slotH   = 0;
  if (numRows > 0) {
    slotH = (wallH - (numRows + 1) * barW) / numRows;
  }

  // --- numRows = 0 → スロット行が入らない → 全高さソリッドリング ---
  if (numRows <= 0) {
    const shape = new THREE.Shape();
    shape.absarc(0, 0, outerR, 0, Math.PI * 2, false);
    const hole = new THREE.Path();
    hole.absarc(0, 0, innerR, 0, Math.PI * 2, true);
    shape.holes.push(hole);

    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: wallH, bevelEnabled: false, curveSegments: 64,
    });
    geo.rotateX(-Math.PI / 2);
    geo.translate(0, wallBottomY, 0);
    meshGroup.add(new THREE.Mesh(geo, matOuter));
    return;
  }

  // --- 水平リブ（フルアニュラスリング）×（numRows + 1）---
  for (let r = 0; r <= numRows; r++) {
    const ribBottomY = wallBottomY + r * (barW + slotH);
    const shape = new THREE.Shape();
    shape.absarc(0, 0, outerR, 0, Math.PI * 2, false);
    const hole = new THREE.Path();
    hole.absarc(0, 0, innerR, 0, Math.PI * 2, true);
    shape.holes.push(hole);

    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: barW, bevelEnabled: false, curveSegments: 64,
    });
    geo.rotateX(-Math.PI / 2);
    geo.translate(0, ribBottomY, 0);
    meshGroup.add(new THREE.Mesh(geo, matOuter));
  }

  // --- 垂直バー（ウェッジ形状）× numRows × numCols ---
  //   両端をリブと正確に一致させる（welding で結合）
  if (slotH > 0) {
    for (let row = 0; row < numRows; row++) {
      const barBottomY = wallBottomY + (row + 1) * barW + row * slotH;
      const barH       = slotH;

      for (let col = 0; col < numCols; col++) {
        const a0 = col * colAng;
        const a1 = a0 + barAng;

        const wedge = new THREE.Shape();
        wedge.moveTo(outerR * Math.cos(a0), outerR * Math.sin(a0));
        wedge.absarc(0, 0, outerR, a0, a1, false);
        wedge.lineTo(innerR * Math.cos(a1), innerR * Math.sin(a1));
        wedge.absarc(0, 0, innerR, a1, a0, true);
        wedge.closePath();

        const geo = new THREE.ExtrudeGeometry(wedge, {
          depth: barH, bevelEnabled: false, curveSegments: 8,
        });
        geo.rotateX(-Math.PI / 2);
        geo.translate(0, barBottomY, 0);
        meshGroup.add(new THREE.Mesh(geo, matOuter));
      }
    }
  }
}

// ============================================================
//  形状生成
// ============================================================
function buildMesh() {
  // 古いメッシュを削除
  while (meshGroup.children.length) meshGroup.remove(meshGroup.children[0]);
  if (bboxHelper) { scene.remove(bboxHelper); bboxHelper = null; }

  const segs      = 64;
  const outerR    = parseFloat(document.getElementById('outerD').value)    / 2;
  const thickness = parseFloat(document.getElementById('thickness').value);
  const holeR     = parseFloat(document.getElementById('holeD').value)     / 2;
  const holeDepth = parseFloat(document.getElementById('holeDepth').value);

  // 凹み底面の厚み（最低 1mm を確保）
  // 浅い場合：厚み - 深さ（残った材料）
  // 深い場合：固定 1mm（蓋の下にチューブ状に突き出る）
  const naturalBottom = thickness - holeDepth;
  const bottomThick   = Math.max(1, naturalBottom);

  // -- 外周リング（ExtrudeGeometry で穴あきディスク）--
  const ringShape = new THREE.Shape();
  ringShape.absarc(0, 0, outerR, 0, Math.PI * 2, false);
  const innerPath = new THREE.Path();
  innerPath.absarc(0, 0, holeR, 0, Math.PI * 2, true);
  ringShape.holes.push(innerPath);

  const ringGeo = new THREE.ExtrudeGeometry(ringShape, {
    depth: thickness,
    bevelEnabled: false,
    curveSegments: segs,
  });
  // ExtrudeGeometry は Z方向に伸びるので X軸-90°回転すると Y=0〜thickness になる
  ringGeo.rotateX(-Math.PI / 2);
  meshGroup.add(new THREE.Mesh(ringGeo, matOuter));

  // -- 凹み底面（網目付き円盤 or ソリッド円盤）--
  // 凹み内側の底（水が溜まる面）の Y 座標
  const bottomTopY    = thickness - holeDepth;
  const bottomBottomY = bottomTopY - bottomThick;

  const meshOn   = document.getElementById('meshOn').checked;
  const barW     = parseFloat(document.getElementById('barW').value);
  const slotSize = parseFloat(document.getElementById('slotSize').value);

  // 底面の外径はリムの内径と一致（STL 出力時に頂点溶接 + 重複面削除でクリーンアップ）
  const EPS = 0;
  const bottomR = holeR;

  // 中央凸の有無と直径を取得（クリッピング用）
  const bumpOnForClip = document.getElementById('bumpOn').checked;
  const bumpR_clip    = bumpOnForClip ? (parseFloat(document.getElementById('bumpD').value) / 2) : 0;
  const doBumpClip    = bumpOnForClip && bumpR_clip > 0 && bumpR_clip < bottomR;

  // 底面は常に ExtrudeGeometry を使う（メッシュ穴 + 中央凸クリッピング両対応）
  const bottomShape = new THREE.Shape();
  bottomShape.absarc(0, 0, bottomR, 0, Math.PI * 2, false);

  // 中央凸の足元クリッピング穴
  if (doBumpClip) {
    const bumpHole = new THREE.Path();
    bumpHole.absarc(0, 0, bumpR_clip, 0, Math.PI * 2, true);
    bottomShape.holes.push(bumpHole);
  }

  // メッシュ穴グリッド（外周と中央凸の両方で円弧クリップ）
  const slotInfo = [];
  if (meshOn && (barW + slotSize) > 0.1) {
    const pitch       = barW + slotSize;
    const halfSlot    = slotSize / 2;
    const innerSafeR  = bottomR - barW;       // この外側になるとディスク外周クリップ要
    const outerLimit  = bottomR;              // ディスク外周（クリップ目標円）
    const bumpClipR   = doBumpClip ? bumpR_clip : 0;
    const bumpOuterSafeR = bumpClipR + barW;  // この内側になるとバンプ境界クリップ要

    const gridN = Math.ceil(bottomR * 2 / pitch) + 2;
    const start = -Math.floor(gridN / 2) * pitch;

    for (let i = 0; i < gridN; i++) {
      for (let j = 0; j < gridN; j++) {
        const cx = start + i * pitch;
        const cy = start + j * pitch;

        const farX = Math.abs(cx) + halfSlot;
        const farY = Math.abs(cy) + halfSlot;
        const farDist  = Math.sqrt(farX * farX + farY * farY);
        const nearX = Math.max(0, Math.abs(cx) - halfSlot);
        const nearY = Math.max(0, Math.abs(cy) - halfSlot);
        const nearDist = Math.sqrt(nearX * nearX + nearY * nearY);
        const centerDist = Math.sqrt(cx * cx + cy * cy);

        // 完全外: スキップ
        if (nearDist >= outerLimit) continue;
        // 完全にバンプの中: スキップ
        if (bumpClipR > 0 && farDist <= bumpClipR) continue;
        // 中心が外周ギリギリ or バンプギリギリは薄片回避でスキップ
        if (centerDist > outerLimit - barW * 0.3) continue;
        if (bumpClipR > 0 && centerDist < bumpClipR + barW * 0.3) continue;

        const needsOuterClip = farDist > innerSafeR;
        const needsBumpClip  = bumpClipR > 0 && nearDist < bumpOuterSafeR;

        const slot = new THREE.Path();
        if (!needsOuterClip && !needsBumpClip) {
          // 完全に annular 内側: 矩形そのまま
          slot.moveTo(cx - halfSlot, cy - halfSlot);
          slot.lineTo(cx - halfSlot, cy + halfSlot);
          slot.lineTo(cx + halfSlot, cy + halfSlot);
          slot.lineTo(cx + halfSlot, cy - halfSlot);
          slot.lineTo(cx - halfSlot, cy - halfSlot);
        } else {
          // クリッピング: 矩形周囲をサンプリングして円外/円内を境界に射影
          const samples = 16;
          const corners = [
            [cx - halfSlot, cy - halfSlot],
            [cx - halfSlot, cy + halfSlot],
            [cx + halfSlot, cy + halfSlot],
            [cx + halfSlot, cy - halfSlot],
          ];
          const rawPts = [];
          for (let s = 0; s < 4; s++) {
            const a = corners[s], b = corners[(s + 1) % 4];
            for (let k = 0; k < samples; k++) {
              const t = k / samples;
              let x = a[0] + (b[0] - a[0]) * t;
              let y = a[1] + (b[1] - a[1]) * t;
              const r = Math.sqrt(x * x + y * y);
              if (bumpClipR > 0 && r < bumpClipR) {
                // バンプ内側は外側へ射影
                const sc = bumpClipR / r;
                x *= sc; y *= sc;
              } else if (r > outerLimit) {
                // 外周外側は内側へ射影
                const sc = outerLimit / r;
                x *= sc; y *= sc;
              }
              rawPts.push([x, y]);
            }
          }
          const pts = [];
          for (const p of rawPts) {
            const prev = pts[pts.length - 1];
            if (!prev || Math.abs(prev[0] - p[0]) > 0.05 || Math.abs(prev[1] - p[1]) > 0.05) pts.push(p);
          }
          if (pts.length > 1) {
            const f = pts[0], l = pts[pts.length - 1];
            if (Math.abs(f[0] - l[0]) < 0.05 && Math.abs(f[1] - l[1]) < 0.05) pts.pop();
          }
          if (pts.length < 3) continue;
          slot.moveTo(pts[0][0], pts[0][1]);
          for (let k = 1; k < pts.length; k++) slot.lineTo(pts[k][0], pts[k][1]);
          slot.lineTo(pts[0][0], pts[0][1]);
        }

        bottomShape.holes.push(slot);
        slotInfo.push({ cx, cy, halfSlot });
      }
    }
  }

  const bottomGeo = new THREE.ExtrudeGeometry(bottomShape, {
    depth: bottomThick,
    bevelEnabled: false,
    curveSegments: segs,
  });
  bottomGeo.rotateX(-Math.PI / 2);
  bottomGeo.translate(0, bottomTopY - bottomThick, 0);
  const bottomMesh = new THREE.Mesh(bottomGeo, matInner);
  // STL エクスポート時に Manifold で再構築できる情報を userData に
  bottomMesh.userData.csgRebuild = {
    type: 'meshDisk',
    outerR: bottomR,
    centerHoleR: doBumpClip ? bumpR_clip : 0,
    thickness: bottomThick,
    topY: bottomTopY,
    slots: slotInfo,
    material: 'inner',
  };
  meshGroup.add(bottomMesh);

  // -- 凹み側壁 --
  if (holeDepth > 0.01) {
    if (meshOn && (barW + slotSize) > 0.1) {
      // ケージ状メッシュ側壁（外径はリムの内径と一致）
      buildSideMesh(holeR, holeDepth, barW, slotSize, thickness);
    } else {
      // ソリッドの場合：
      //   浅い凹み (holeDepth <= thickness): リムの内側面が壁を兼ねるので追加不要
      //   深い凹み (holeDepth >  thickness): リム下の管をクローズドチューブとして追加
      if (holeDepth > thickness) {
        const tubeWallT  = Math.max(barW, 1);   // 管の壁厚
        const tubeOuterR = holeR + tubeWallT;
        const tubeInnerR = holeR;
        const tubeTopY    = 0;                              // リム下端と一致（welding で結合）
        const tubeBottomY = thickness - holeDepth;          // 凹み底
        const tubeH       = tubeTopY - tubeBottomY;

        const tubeShape = new THREE.Shape();
        tubeShape.absarc(0, 0, tubeOuterR, 0, Math.PI * 2, false);
        const tubeHole = new THREE.Path();
        tubeHole.absarc(0, 0, tubeInnerR, 0, Math.PI * 2, true);
        tubeShape.holes.push(tubeHole);

        const tubeGeo = new THREE.ExtrudeGeometry(tubeShape, {
          depth: tubeH, bevelEnabled: false, curveSegments: segs,
        });
        tubeGeo.rotateX(-Math.PI / 2);
        tubeGeo.translate(0, tubeBottomY, 0);
        meshGroup.add(new THREE.Mesh(tubeGeo, matOuter));
      }
    }
  }

  // -- 中央凸（オプション）--
  const bumpOn = document.getElementById('bumpOn').checked;
  if (bumpOn) {
    const bumpR = parseFloat(document.getElementById('bumpD').value) / 2;
    const bumpH = parseFloat(document.getElementById('bumpH').value);
    // 凸の底＝凹みの内側底（水が溜まる面）と一致（welding で結合）
    buildCenterBump(bumpR, bumpH, bottomTopY, barW, slotSize, meshOn);
  }

  // -- 外周フック（ネット引っかけ用突起）--
  const hooksOn = document.getElementById('hooksOn').checked;
  if (hooksOn) {
    const hookCount = parseInt(document.getElementById('hookCount').value);
    const hookH     = parseFloat(document.getElementById('hookH').value);
    const hookBaseR = parseFloat(document.getElementById('hookD').value) / 2;
    buildHooks(outerR, holeR, thickness, hookCount, hookH, hookBaseR);
  }

  // -- バウンディングボックス --
  const bb = new THREE.Box3().setFromObject(meshGroup);
  bboxHelper = new THREE.Box3Helper(bb, 0x2ecc71);
  scene.add(bboxHelper);

  const size = new THREE.Vector3();
  bb.getSize(size);
  document.getElementById('bb-x').textContent = size.x.toFixed(1) + ' mm';
  document.getElementById('bb-y').textContent = size.z.toFixed(1) + ' mm';
  document.getElementById('bb-z').textContent = size.y.toFixed(1) + ' mm';
}

// ============================================================
//  スライダー イベント
// ============================================================
['outerD', 'thickness', 'holeD', 'holeDepth', 'barW', 'slotSize',
 'bumpD', 'bumpH', 'hookCount', 'hookH', 'hookD'].forEach(id => {
  const el    = document.getElementById(id);
  const valEl = document.getElementById('val-' + id);
  el.addEventListener('input', () => { valEl.textContent = el.value; buildMesh(); });
});

document.getElementById('meshOn') .addEventListener('change', buildMesh);
document.getElementById('bumpOn') .addEventListener('change', buildMesh);
document.getElementById('hooksOn').addEventListener('change', buildMesh);

document.getElementById('btn-update').addEventListener('click', buildMesh);

// ============================================================
//  STL エクスポート（バイナリ形式）
//  頂点溶接 + 重複三角形（背中合わせの内部面）削除を行い、非多様体を低減
// ============================================================
function exportSTL() {
  meshGroup.updateMatrixWorld(true);

  // ---- Step 1: 全メッシュの全三角形を集めて頂点を溶接 ----
  const tol  = 1e-3;            // 溶接トレランス（1 µm）
  const grid = new Map();       // 量子化座標 → グローバル頂点 ID
  const verts = [];             // [x, y, z, ...] flat array
  const tris  = [];             // 三角形 [a, b, c, a, b, c, ...] flat array

  function getOrAddVert(x, y, z) {
    const kx = Math.round(x / tol);
    const ky = Math.round(y / tol);
    const kz = Math.round(z / tol);
    const key = `${kx},${ky},${kz}`;
    const id = grid.get(key);
    if (id !== undefined) return id;
    const newId = verts.length / 3;
    verts.push(x, y, z);
    grid.set(key, newId);
    return newId;
  }

  const v = new THREE.Vector3();
  meshGroup.traverse((obj) => {
    if (!obj.isMesh) return;
    const geo = obj.geometry;
    if (!geo || !geo.attributes.position) return;
    const pos = geo.attributes.position;
    const idx = geo.index;
    const M = obj.matrixWorld;
    const triCount = idx ? idx.count / 3 : pos.count / 3;

    for (let i = 0; i < triCount; i++) {
      const i1 = idx ? idx.getX(i * 3 + 0) : i * 3 + 0;
      const i2 = idx ? idx.getX(i * 3 + 1) : i * 3 + 1;
      const i3 = idx ? idx.getX(i * 3 + 2) : i * 3 + 2;

      v.fromBufferAttribute(pos, i1).applyMatrix4(M);
      const a = getOrAddVert(v.x, v.y, v.z);
      v.fromBufferAttribute(pos, i2).applyMatrix4(M);
      const b = getOrAddVert(v.x, v.y, v.z);
      v.fromBufferAttribute(pos, i3).applyMatrix4(M);
      const c = getOrAddVert(v.x, v.y, v.z);

      // 退化（同一頂点を含む）三角形はスキップ
      if (a === b || b === c || a === c) continue;
      tris.push(a, b, c);
    }
  });

  // ---- Step 2: 重複（背中合わせ）三角形を削除 ----
  // 同じ 3 頂点を持つ三角形は内部面なので両方とも削除
  const triKeys = new Array(tris.length / 3);
  const keyCount = new Map();
  for (let i = 0; i < tris.length / 3; i++) {
    const a = tris[i * 3 + 0];
    const b = tris[i * 3 + 1];
    const c = tris[i * 3 + 2];
    // ソートして正規化
    let s0 = a, s1 = b, s2 = c;
    if (s0 > s1) [s0, s1] = [s1, s0];
    if (s1 > s2) [s1, s2] = [s2, s1];
    if (s0 > s1) [s0, s1] = [s1, s0];
    const key = `${s0},${s1},${s2}`;
    triKeys[i] = key;
    keyCount.set(key, (keyCount.get(key) || 0) + 1);
  }

  const keptTris = [];
  let removedCount = 0;
  for (let i = 0; i < tris.length / 3; i++) {
    if (keyCount.get(triKeys[i]) > 1) {
      removedCount++;
      continue;
    }
    keptTris.push(tris[i * 3 + 0], tris[i * 3 + 1], tris[i * 3 + 2]);
  }

  const N = keptTris.length / 3;
  console.log(`STL export: ${verts.length/3} verts, ${tris.length/3} raw tris → ${N} cleaned tris (removed ${removedCount} duplicates)`);
  if (N === 0) return null;

  // ---- Step 3: バイナリ STL 書き込み ----
  const buffer = new ArrayBuffer(84 + N * 50);
  const view   = new DataView(buffer);

  // 80 byte ヘッダ
  const desc = 'drain cover generator (welded, dedup) - binary STL';
  for (let i = 0; i < Math.min(desc.length, 80); i++) {
    view.setUint8(i, desc.charCodeAt(i));
  }
  view.setUint32(80, N, true);

  const v1 = new THREE.Vector3();
  const v2 = new THREE.Vector3();
  const v3 = new THREE.Vector3();
  const cb = new THREE.Vector3();
  const ab = new THREE.Vector3();
  const nv = new THREE.Vector3();

  let off = 84;
  for (let i = 0; i < N; i++) {
    const a = keptTris[i * 3 + 0];
    const b = keptTris[i * 3 + 1];
    const c = keptTris[i * 3 + 2];

    v1.set(verts[a*3+0], verts[a*3+1], verts[a*3+2]);
    v2.set(verts[b*3+0], verts[b*3+1], verts[b*3+2]);
    v3.set(verts[c*3+0], verts[c*3+1], verts[c*3+2]);

    cb.subVectors(v3, v2);
    ab.subVectors(v1, v2);
    nv.crossVectors(cb, ab);
    if (nv.lengthSq() > 0) nv.normalize();
    else nv.set(0, 0, 1);

    view.setFloat32(off +  0, nv.x, true);
    view.setFloat32(off +  4, nv.y, true);
    view.setFloat32(off +  8, nv.z, true);
    view.setFloat32(off + 12, v1.x, true);
    view.setFloat32(off + 16, v1.y, true);
    view.setFloat32(off + 20, v1.z, true);
    view.setFloat32(off + 24, v2.x, true);
    view.setFloat32(off + 28, v2.y, true);
    view.setFloat32(off + 32, v2.z, true);
    view.setFloat32(off + 36, v3.x, true);
    view.setFloat32(off + 40, v3.y, true);
    view.setFloat32(off + 44, v3.z, true);
    view.setUint16 (off + 48, 0, true);
    off += 50;
  }

  return { buffer, triCount: N, removedDups: removedCount };
}

// ============================================================
//  Manifold-3D を使った CSG ベースの STL エクスポート（クリーン版）
//  全パーツを CSG ユニオン → 完全な watertight manifold を生成
// ============================================================
let manifoldPromise = null;
async function loadManifold() {
  if (manifoldPromise) return manifoldPromise;

  manifoldPromise = (async () => {
    const ver     = '3.0.1';
    const baseUrl = `https://cdn.jsdelivr.net/npm/manifold-3d@${ver}/`;
    const Module  = (await import(/* @vite-ignore */ baseUrl + 'manifold.js')).default;
    const wasm    = await Module({
      locateFile: (path) => baseUrl + path
    });
    wasm.setup();
    return wasm;
  })().catch((err) => {
    manifoldPromise = null;
    throw err;
  });

  return manifoldPromise;
}

async function exportSTLClean() {
  const wasm = await loadManifold();
  const { Manifold, Mesh } = wasm;

  meshGroup.updateMatrixWorld(true);

  // CSG プリミティブからメッシュディスク（外円 - 中央穴 - スロット箱）を作る
  // Three.js ExtrudeGeometry は複数の穴があると非マニフォールドを生成するため、
  // STL 出力時のみ Manifold ベースで再構築する
  function buildMeshDiskManifold(spec) {
    // disk: cylinder(outerR, thickness) at topY (top surface at topY)
    const r = spec.outerR;
    const t = spec.thickness;
    const yTop = spec.topY;
    const yBot = yTop - t;
    const cylSegs = 64;

    // ベース円柱（中心は Y軸方向で yBot..yTop）
    let body = Manifold.cylinder(t, r, r, cylSegs, false);
    // Manifold.cylinder は (0,0,0) を底面中心として +Z 方向に伸びる。Y軸基準にするため Z→Y rot。
    body = body.rotate([90, 0, 0]).translate([0, yBot + t, 0]);
    // 上記の rotate+translate で正しい Y 位置に
    // しかし Manifold.cylinder は Z+ 方向に伸びるので、rotate([90,0,0])で +Z → -Y になってしまう。
    // 代わりに +Z を +Y に持ってくる方向の回転 (-90度 around X)
    // Manifold の rotate は degrees。-90 度 around X。

    // 仕切り直し
    body.delete();
    body = Manifold.cylinder(t, r, r, cylSegs, false)
      .rotate([-90, 0, 0])             // +Z → +Y
      .translate([0, yBot, 0]);        // 底面が yBot に

    // 中央穴を引く
    if (spec.centerHoleR > 0 && spec.centerHoleR < r) {
      const eps = 0.1;  // 確実に貫通させる
      const hole = Manifold.cylinder(t + 2*eps, spec.centerHoleR, spec.centerHoleR, cylSegs, false)
        .rotate([-90, 0, 0])
        .translate([0, yBot - eps, 0]);
      const newBody = Manifold.difference(body, hole);
      body.delete(); hole.delete();
      body = newBody;
    }

    // スロット穴を引く（cube プリミティブを各位置に配置して difference）
    const eps = 0.1;
    const boxes = [];
    for (const s of spec.slots) {
      const size = s.halfSlot * 2;
      const box = Manifold.cube([size, t + 2*eps, size], true)  // 中心配置
        .translate([s.cx, (yBot + yTop) / 2, s.cy]);
      boxes.push(box);
    }
    if (boxes.length > 0) {
      // 全 box を union してから一括 difference の方が早い
      const allHoles = Manifold.union(boxes);
      boxes.forEach(b => b.delete());
      const newBody = Manifold.difference(body, allHoles);
      body.delete(); allHoles.delete();
      body = newBody;
    }

    return body;
  }

  // 各 Three.js メッシュを Manifold に変換
  const manifolds = [];
  const v = new THREE.Vector3();

  meshGroup.traverse((obj) => {
    if (!obj.isMesh) return;

    // CSG 再構築が必要なメッシュは Manifold プリミティブで作り直す
    if (obj.userData && obj.userData.csgRebuild && obj.userData.csgRebuild.type === 'meshDisk') {
      try {
        const mf = buildMeshDiskManifold(obj.userData.csgRebuild);
        manifolds.push(mf);
      } catch (e) {
        console.warn('CSG rebuild 失敗 (meshDisk):', e.message || e);
      }
      return;
    }

    const geo = obj.geometry;
    if (!geo || !geo.attributes.position) return;
    const pos = geo.attributes.position;
    const idx = geo.index;
    const M   = obj.matrixWorld;
    const nV  = pos.count;

    // 頂点（ワールド座標）を配列に
    const rawVerts = new Float32Array(nV * 3);
    for (let i = 0; i < nV; i++) {
      v.fromBufferAttribute(pos, i).applyMatrix4(M);
      rawVerts[i*3+0] = v.x;
      rawVerts[i*3+1] = v.y;
      rawVerts[i*3+2] = v.z;
    }

    // 元のインデックス（無い場合は i のまま）
    let rawTriVerts;
    if (idx) {
      rawTriVerts = new Uint32Array(idx.count);
      for (let i = 0; i < idx.count; i++) rawTriVerts[i] = idx.getX(i);
    } else {
      rawTriVerts = new Uint32Array(nV);
      for (let i = 0; i < nV; i++) rawTriVerts[i] = i;
    }

    // --- 頂点をローカルにデデュプリケート（Manifold は完全閉曲面を要求） ---
    const tol = 1e-4;
    const seen = new Map();
    const remap = new Int32Array(nV);
    const uniqueVerts = [];
    for (let i = 0; i < nV; i++) {
      const x = rawVerts[i*3+0];
      const y = rawVerts[i*3+1];
      const z = rawVerts[i*3+2];
      const k = `${Math.round(x/tol)},${Math.round(y/tol)},${Math.round(z/tol)}`;
      let id = seen.get(k);
      if (id === undefined) {
        id = uniqueVerts.length / 3;
        seen.set(k, id);
        uniqueVerts.push(x, y, z);
      }
      remap[i] = id;
    }

    // インデックスを再マッピングし、退化三角形を除去
    const newTris = [];
    for (let i = 0; i < rawTriVerts.length; i += 3) {
      const a = remap[rawTriVerts[i+0]];
      const b = remap[rawTriVerts[i+1]];
      const c = remap[rawTriVerts[i+2]];
      if (a === b || b === c || a === c) continue;
      newTris.push(a, b, c);
    }

    const vertProperties = new Float32Array(uniqueVerts);
    const triVerts       = new Uint32Array(newTris);

    try {
      const mesh = new Mesh({ numProp: 3, vertProperties, triVerts });
      const mf   = new Manifold(mesh);
      manifolds.push(mf);
    } catch (e) {
      console.warn(`Manifold 変換失敗 (${geo.type}):`, e.message || e);
    }
  });

  if (manifolds.length === 0) return null;

  // 全てユニオン
  let result;
  if (manifolds.length === 1) {
    result = manifolds[0];
  } else {
    // Manifold.union(array) でまとめてユニオン
    result = Manifold.union(manifolds);
  }

  const outMesh   = result.getMesh();
  const positions = outMesh.vertProperties;
  const indices   = outMesh.triVerts;

  // クリーンアップ
  manifolds.forEach(m => m.delete());
  if (result !== manifolds[0] || manifolds.length > 1) result.delete();

  // STL バイナリ書き込み
  const N = indices.length / 3;
  if (N === 0) return null;

  const buffer = new ArrayBuffer(84 + N * 50);
  const view   = new DataView(buffer);
  const desc   = 'drain cover generator (manifold-CSG) - binary STL';
  for (let i = 0; i < Math.min(desc.length, 80); i++) {
    view.setUint8(i, desc.charCodeAt(i));
  }
  view.setUint32(80, N, true);

  let off = 84;
  for (let i = 0; i < N; i++) {
    const a = indices[i*3+0];
    const b = indices[i*3+1];
    const c = indices[i*3+2];
    const ax = positions[a*3+0], ay = positions[a*3+1], az = positions[a*3+2];
    const bx = positions[b*3+0], by = positions[b*3+1], bz = positions[b*3+2];
    const cx = positions[c*3+0], cy = positions[c*3+1], cz = positions[c*3+2];

    // 法線 = (c-b) × (a-b)
    const ux = cx - bx, uy = cy - by, uz = cz - bz;
    const vx = ax - bx, vy = ay - by, vz = az - bz;
    let nx = uy*vz - uz*vy;
    let ny = uz*vx - ux*vz;
    let nz = ux*vy - uy*vx;
    const nL = Math.sqrt(nx*nx + ny*ny + nz*nz);
    if (nL > 1e-12) { nx/=nL; ny/=nL; nz/=nL; }
    else            { nx = 0; ny = 0; nz = 1; }

    view.setFloat32(off +  0, nx, true);
    view.setFloat32(off +  4, ny, true);
    view.setFloat32(off +  8, nz, true);
    view.setFloat32(off + 12, ax, true);
    view.setFloat32(off + 16, ay, true);
    view.setFloat32(off + 20, az, true);
    view.setFloat32(off + 24, bx, true);
    view.setFloat32(off + 28, by, true);
    view.setFloat32(off + 32, bz, true);
    view.setFloat32(off + 36, cx, true);
    view.setFloat32(off + 40, cy, true);
    view.setFloat32(off + 44, cz, true);
    view.setUint16 (off + 48, 0, true);
    off += 50;
  }

  return { buffer, triCount: N, method: 'manifold-csg' };
}

// ============================================================
//  ダウンロードボタンのハンドラ（Manifold 優先、失敗時は dedup フォールバック）
// ============================================================
async function downloadSTL() {
  const s = document.getElementById('status');
  s.textContent = '⏳ Manifold-3D 準備中...';

  let result = null;
  let method = 'dedup';

  // 1. Manifold-3D による CSG ユニオン（クリーン）を試す
  try {
    s.textContent = '⏳ CSG union 計算中...';
    await new Promise(r => setTimeout(r, 30));  // UI 更新
    result = await exportSTLClean();
    if (result) method = 'manifold';
  } catch (e) {
    console.warn('Manifold export 失敗、フォールバック:', e);
  }

  // 2. フォールバック：頂点溶接 + 重複三角形削除
  if (!result) {
    s.textContent = '⏳ 通常モードで STL 生成中...';
    await new Promise(r => setTimeout(r, 30));
    result = exportSTL();
  }

  if (!result) {
    s.textContent = '⚠️ メッシュが空です';
    setTimeout(() => { s.textContent = '✅ 準備完了'; }, 2500);
    return;
  }

  const blob = new Blob([result.buffer], { type: 'application/octet-stream' });
  const url  = URL.createObjectURL(blob);

  const outerD = document.getElementById('outerD').value;
  const holeD  = document.getElementById('holeD').value;
  const filename = `drain_cover_D${outerD}_hole${holeD}.stl`;

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  const sizeKB = (result.buffer.byteLength / 1024).toFixed(1);
  const tag    = method === 'manifold' ? '✨ CSG' : '🛠 dedup';
  s.textContent = `✅ DL完了 ${tag} (${result.triCount}三角形 / ${sizeKB} KB)`;
  setTimeout(() => { s.textContent = '✅ 準備完了'; }, 5000);
}

document.getElementById('btn-download').addEventListener('click', downloadSTL);

// ============================================================
//  モバイル：パネルの開閉
// ============================================================
const panel        = document.getElementById('panel');
const panelToggle  = document.getElementById('panel-toggle');
const panelClose   = document.getElementById('panel-close');

panelToggle.addEventListener('click', () => panel.classList.add('open'));
panelClose .addEventListener('click', () => panel.classList.remove('open'));

// スライダー操作後、自動で閉じない（連続調整しやすく）。閉じるは✕で。

// ============================================================
//  リサイズ & アニメーションループ
// ============================================================
function onResize() {
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  if (w === 0 || h === 0) return;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', onResize);

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// ページレイアウトが確定してから初期化
requestAnimationFrame(() => {
  onResize();
  buildMesh();
  animate();
});
</script>
